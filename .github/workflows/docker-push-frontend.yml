name: Build & Push Frontend on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Frontend Docker Image
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'frontend-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smart-hydroponic-frontend
            context: frontend-vue
            file: frontend-vue/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            tag="$RELEASE_TAG"
          else
            tag="$(git tag -l 'frontend-v*' --sort=-v:refname | head -n 1)"
          fi

          if [[ -z "$tag" ]]; then
            echo "::error::No frontend release tag found. Expected a tag matching 'frontend-v*'."
            exit 1
          fi

          git checkout --detach "$tag"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (optional for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PUSH }}

      - name: Build & Push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:${{ steps.release_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
